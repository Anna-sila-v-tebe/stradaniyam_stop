<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Перестаем страдать в отношениях</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
background:#FAF8F4;
color:#2d2d2d;
}

.hero{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

text-align:center;

padding:30px;

}

h1{

font-size:54px;

max-width:900px;

line-height:1.15;

margin-bottom:30px;

}

p{

font-size:24px;

max-width:700px;

line-height:1.6;

margin-bottom:40px;

}

button{

background:#4B2F2F;

color:white;

padding:20px 45px;

border:none;

border-radius:60px;

font-size:22px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);

}

</style>

</head>

<body>

<section class="hero">

<h1>

Ты страдаешь не из-за отношений.

<br><br>

Ты страдаешь из-за ожиданий, которые незаметно управляют твоей жизнью.

</h1>

<p>

За 20 минут ты поймешь истинную причину своей боли и сделаешь первый шаг к внутреннему спокойствию.

</p>

<button>

Начать практику

</button>

</section>

</body>

</html>
